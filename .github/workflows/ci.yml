name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded in-flight runs for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: grant nothing by default; each job opts in to what it needs.
permissions: {}

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          # go.mod pins `toolchain go1.26.4`, so the build uses the patched
          # stdlib regardless of what setup-go pre-installs. check-latest fetches
          # the newest matching patch; the toolchain directive is the repro anchor.
          go-version-file: go.mod
          check-latest: true
          # Key the built-in module+build cache on the full dependency graph.
          cache-dependency-path: go.sum

      - name: Unit tests (race + shuffle + coverage)
        # CI never passes `-tags pi5_hardware`, so internal/mailbox/mailbox_hw_test.go
        # (//go:build pi5_hardware) is excluded at COMPILE time and never runs here —
        # the hermetic suite needs no /dev/vcio. -race runs natively on amd64.
        run: |
          go test -race -shuffle=on -timeout=120s \
            -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: always()
        run: |
          {
            echo '### Coverage'
            echo '```'
            go tool cover -func=coverage.out | tail -n 1
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cross-compile arm64 (prove the Pi 5 target links)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: "0"
        run: go build -trimpath -o /dev/null .

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum

      # golangci-lint v2 covers formatting (gofumpt/goimports) and `go vet`,
      # so there are no separate gofmt/vet steps. The action downloads the
      # official binary (built with Go >= our go directive).
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12

      - name: govulncheck
        # Built and run with the repo's toolchain (go1.26.4), so the stdlib
        # report reflects the patched toolchain we actually ship with. Text
        # output exits non-zero on a reachable vulnerability, failing the job.
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
