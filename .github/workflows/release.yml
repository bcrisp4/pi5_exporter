name: release

on:
  push:
    # Semver release tags only. GitHub tag filters use a glob subset where
    # [0-9] is a digit class, + means "one or more", and . is a literal dot —
    # so these reject stray tags like "vfoo", "v1", or "v1.2.3.4".
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # releases:    v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*" # prereleases: v1.2.3-rc1

permissions: {}

jobs:
  # Binaries (arm64 + armv7), archives, checksums, SBOM, changelog, and the
  # GitHub Release — all via GoReleaser — plus a signed build-provenance
  # attestation over the released artifacts.
  goreleaser:
    name: binaries + github release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
      id-token: write # OIDC token for keyless (Sigstore) attestation
      attestations: write # write the attestation to GitHub
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache-dependency-path: go.sum

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attests every artifact listed in checksums.txt (both arch archives).
      - name: Attest binary provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-checksums: dist/checksums.txt

  # Multi-stage distroless image (linux/arm64) built from the repo Dockerfile,
  # pushed to GHCR, with a signed build-provenance attestation over the digest.
  image:
    name: container image (ghcr)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image + attestation to GHCR
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/bcrisp4/pi5_exporter
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: latest=auto # tag :latest only for the highest non-prerelease

      - name: Build date
        id: vars
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false # use the GitHub attestation below, not buildx's own
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.vars.outputs.date }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/bcrisp4/pi5_exporter
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
